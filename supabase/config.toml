project_id = "sui-note"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:1420"
additional_redirect_urls = ["http://localhost:1420", "tauri://localhost"]
jwt_expiry = 3600
enable_refresh_token_rotation = true

[edge_runtime]
enabled = true
policy = "per_worker"
