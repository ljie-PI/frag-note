name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install

      - name: Test domain
        run: bun run --filter @frag-note/domain test

      - name: Test contracts
        run: bun run --filter @frag-note/contracts test

      - name: Test API
        run: bun run --filter @frag-note/api test:shell

      - name: Build API
        run: bun run --filter @frag-note/api build

      - name: Lint
        run: bun run lint
